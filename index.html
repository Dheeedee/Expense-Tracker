<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .container {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }

    h1 {
      color: #f8fafc;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #94a3b8;
      text-align: center;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 140px;
      position: relative;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .naira-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-weight: 600;
      font-size: 15px;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #3b82f6;
    }

    .amount-input {
      padding-left: 28px;
    }

    .suggestion-box {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #0f172a;
      border: 1px solid #334155;
      border-top: none;
      border-radius: 0 0 10px 10px;
      z-index: 10;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }

    .suggestion-box.active {
      display: block;
    }

    .suggestion-item {
      padding: 10px 14px;
      color: #cbd5e1;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .suggestion-item:hover,
    .suggestion-item.highlighted {
      background: #1e293b;
      color: #f1f5f9;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 24px;
    }

    button:hover {
      background: #2563eb;
    }

    button:active {
      transform: scale(0.98);
    }

    .section-label {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .expense-list {
      list-style: none;
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 16px;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    .expense-list::-webkit-scrollbar {
      width: 5px;
    }

    .expense-list::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: #0f172a;
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid #1e293b;
      transition: border-color 0.2s;
    }

    .expense-item:hover {
      border-color: #334155;
    }

    .expense-name {
      color: #f1f5f9;
      font-size: 15px;
      font-weight: 500;
      word-break: break-word;
      flex: 1;
      margin-right: 12px;
    }

    .expense-amount {
      color: #facc15;
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 18px;
      cursor: pointer;
      padding: 0 0 0 12px;
      margin: 0;
      width: auto;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: none;
      transform: none;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 14px;
      background: #0f172a;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    .total-label {
      color: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .total-amount {
      color: #22c55e;
      font-size: 20px;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #475569;
    }

    .empty-state p {
      font-size: 14px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #1e293b;
      border-radius: 16px;
      padding: 28px 24px 20px;
      max-width: 340px;
      width: 100%;
      border: 1px solid #334155;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    .modal-box p {
      color: #f1f5f9;
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-box p strong {
      color: #facc15;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      margin: 0;
      padding: 10px;
      font-size: 14px;
      border-radius: 10px;
    }

    .btn-cancel {
      background: #334155 !important;
    }

    .btn-cancel:hover {
      background: #475569 !important;
    }

    .btn-confirm-delete {
      background: #ef4444 !important;
    }

    .btn-confirm-delete:hover {
      background: #dc2626 !important;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #22c55e;
      color: #052e16;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #ef4444;
      color: #fff;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px 16px;
      }

      .form-group {
        min-width: 100%;
      }

      h1 {
        font-size: 22px;
      }

      .total-amount {
        font-size: 18px;
      }

      .toast {
        font-size: 13px;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>
    <p class="subtitle">Keep tabs on your spending</p>

    <div class="form-row">
      <div class="form-group">
        <label for="expenseName">Expense</label>
        <input type="text" id="expenseName" placeholder="e.g. Groceries" autocomplete="off" autofocus>
        <div class="suggestion-box" id="suggestionBox"></div>
      </div>
      <div class="form-group">
        <label for="expenseAmount">Amount (&hairsp;&#8358;&hairsp;)</label>
        <div class="input-wrapper">
          <span class="naira-prefix">&#8358;</span>
          <input type="number" id="expenseAmount" class="amount-input" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
    </div>

    <button id="addBtn">+ Add Expense</button>

    <div class="section-label">Expenses</div>
    <ul class="expense-list" id="expenseList">
      <li class="empty-state"><p>No expenses yet. Add one above!</p></li>
    </ul>

    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-amount" id="totalDisplay">&#8358;0.00</span>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <p>Delete <strong id="deleteTargetName"></strong>?</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelDelete">Cancel</button>
        <button class="btn-confirm-delete" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const expenseName = document.getElementById('expenseName');
    const expenseAmount = document.getElementById('expenseAmount');
    const addBtn = document.getElementById('addBtn');
    const expenseList = document.getElementById('expenseList');
    const totalDisplay = document.getElementById('totalDisplay');
    const suggestionBox = document.getElementById('suggestionBox');
    const modal = document.getElementById('confirmModal');
    const deleteTargetName = document.getElementById('deleteTargetName');
    const cancelDelete = document.getElementById('cancelDelete');
    const confirmDelete = document.getElementById('confirmDelete');
    const toast = document.getElementById('toast');

    const expenses = [];
    let pendingDeleteIndex = null;
    let suggestionHighlight = -1;

    const COMMON_EXPENSES = [
      'Food & Groceries',
      'Transport / Fuel',
      'Rent',
      'Electricity Bill',
      'Water Bill',
      'Internet / Data',
      'Phone / Airtime',
      'Health / Medical',
      'Dining Out',
      'Entertainment',
      'Shopping / Clothing',
      'Education / School Fees',
      'Savings / Investments',
      'Insurance',
      'Household Supplies',
      'Personal Care',
      'Netflix / Subscriptions',
      'Gym / Fitness',
      'Gifts / Donations',
      'Miscellaneous'
    ];

    function formatNaira(amount) {
      return '\u20A6' + Number(amount).toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function updateTotal() {
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      totalDisplay.textContent = formatNaira(total);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderExpenses() {
      if (expenses.length === 0) {
        expenseList.innerHTML = '<li class="empty-state"><p>No expenses yet. Add one above!</p></li>';
        return;
      }

      expenseList.innerHTML = expenses.map((expense, index) => `
        <li class="expense-item">
          <span class="expense-name">${escapeHtml(expense.name)}</span>
          <span class="expense-amount">${formatNaira(expense.amount)}</span>
          <button class="delete-btn" data-index="${index}" title="Delete">&times;</button>
        </li>
      `).join('');
    }

    function showToast(message, isError) {
      toast.textContent = message;
      toast.className = 'toast' + (isError ? ' error' : '');
      requestAnimationFrame(() => {
        toast.classList.add('show');
      });
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    function addExpense() {
      const name = expenseName.value.trim();
      const amount = parseFloat(expenseAmount.value);

      if (!name) {
        expenseName.focus();
        showToast('Please enter an expense name', true);
        return;
      }

      if (isNaN(amount) || amount <= 0) {
        expenseAmount.focus();
        showToast('Please enter a valid amount', true);
        return;
      }

      expenses.push({ name, amount });
      expenseName.value = '';
      expenseAmount.value = '';
      closeSuggestions();

      renderExpenses();
      updateTotal();
      expenseName.focus();
      showToast('Expense added!');
    }

    function deleteExpense(index) {
      expenses.splice(index, 1);
      renderExpenses();
      updateTotal();
      showToast('Expense deleted');
    }

    function openConfirmModal(index) {
      pendingDeleteIndex = index;
      deleteTargetName.textContent = expenses[index].name;
      modal.classList.add('active');
    }

    function closeConfirmModal() {
      pendingDeleteIndex = null;
      modal.classList.remove('active');
    }

    function getFilteredSuggestions(query) {
      if (!query) return COMMON_EXPENSES;
      const q = query.toLowerCase();
      return COMMON_EXPENSES.filter(e => e.toLowerCase().includes(q));
    }

    function renderSuggestions(query) {
      const matches = getFilteredSuggestions(query);
      suggestionHighlight = -1;

      if (matches.length === 0 || matches.length === COMMON_EXPENSES.length && !query) {
        if (!query) {
          suggestionBox.innerHTML = COMMON_EXPENSES
            .map(s => `<div class="suggestion-item">${escapeHtml(s)}</div>`)
            .join('');
          suggestionBox.classList.add('active');
        } else {
          closeSuggestions();
        }
        return;
      }

      suggestionBox.innerHTML = matches
        .map(s => `<div class="suggestion-item">${escapeHtml(s)}</div>`)
        .join('');
      suggestionBox.classList.add('active');
    }

    function closeSuggestions() {
      suggestionBox.classList.remove('active');
      suggestionHighlight = -1;
    }

    function highlightNext() {
      const items = suggestionBox.querySelectorAll('.suggestion-item');
      if (!items.length) return;
      if (suggestionHighlight >= 0) items[suggestionHighlight].classList.remove('highlighted');
      suggestionHighlight = (suggestionHighlight + 1) % items.length;
      items[suggestionHighlight].classList.add('highlighted');
      items[suggestionHighlight].scrollIntoView({ block: 'nearest' });
    }

    function highlightPrev() {
      const items = suggestionBox.querySelectorAll('.suggestion-item');
      if (!items.length) return;
      if (suggestionHighlight >= 0) items[suggestionHighlight].classList.remove('highlighted');
      suggestionHighlight = (suggestionHighlight - 1 + items.length) % items.length;
      items[suggestionHighlight].classList.add('highlighted');
      items[suggestionHighlight].scrollIntoView({ block: 'nearest' });
    }

    function selectHighlighted() {
      const items = suggestionBox.querySelectorAll('.suggestion-item');
      if (suggestionHighlight >= 0 && items[suggestionHighlight]) {
        expenseName.value = items[suggestionHighlight].textContent;
        closeSuggestions();
        expenseAmount.focus();
      }
    }

    expenseName.addEventListener('input', () => {
      renderSuggestions(expenseName.value.trim());
    });

    expenseName.addEventListener('focus', () => {
      renderSuggestions(expenseName.value.trim());
    });

    expenseName.addEventListener('blur', () => {
      setTimeout(closeSuggestions, 150);
    });

    expenseName.addEventListener('keydown', (e) => {
      if (suggestionBox.classList.contains('active')) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          highlightNext();
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          highlightPrev();
          return;
        }
        if (e.key === 'Enter' && suggestionHighlight >= 0) {
          e.preventDefault();
          selectHighlighted();
          return;
        }
        if (e.key === 'Escape') {
          closeSuggestions();
          return;
        }
      }
      if (e.key === 'Enter') {
        expenseAmount.focus();
      }
    });

    suggestionBox.addEventListener('mousedown', (e) => {
      const item = e.target.closest('.suggestion-item');
      if (item) {
        expenseName.value = item.textContent;
        closeSuggestions();
        expenseAmount.focus();
      }
    });

    expenseAmount.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addExpense();
    });

    addBtn.addEventListener('click', addExpense);

    expenseList.addEventListener('click', (e) => {
      const btn = e.target.closest('.delete-btn');
      if (btn) {
        const index = parseInt(btn.dataset.index);
        openConfirmModal(index);
      }
    });

    confirmDelete.addEventListener('click', () => {
      if (pendingDeleteIndex !== null) {
        deleteExpense(pendingDeleteIndex);
        closeConfirmModal();
      }
    });

    cancelDelete.addEventListener('click', closeConfirmModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeConfirmModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeConfirmModal();
      }
    });

    updateTotal();
  </script>
</body>
</html>
