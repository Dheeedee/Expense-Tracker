<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }

    h1 {
      color: #f8fafc;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #94a3b8;
      text-align: center;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 130px;
      position: relative;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .naira-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-weight: 600;
      font-size: 15px;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #3b82f6;
    }

    input[type="month"] {
      text-transform: uppercase;
      color-scheme: dark;
    }

    .amount-input {
      padding-left: 28px;
    }

    .suggestion-box {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #0f172a;
      border: 1px solid #334155;
      border-top: none;
      border-radius: 0 0 10px 10px;
      z-index: 10;
      max-height: 185px;
      overflow-y: auto;
      display: none;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    .suggestion-box.active {
      display: block;
    }

    .suggestion-item {
      padding: 9px 14px;
      color: #cbd5e1;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .suggestion-item:hover {
      background: #1e293b;
      color: #f1f5f9;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 20px;
    }

    button:hover {
      background: #2563eb;
    }

    button:active {
      transform: scale(0.98);
    }

    .section-label {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .expense-list {
      list-style: none;
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 14px;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    .expense-list::-webkit-scrollbar {
      width: 5px;
    }

    .expense-list::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #0f172a;
      border-radius: 10px;
      margin-bottom: 6px;
      border: 1px solid #1e293b;
      transition: border-color 0.2s;
    }

    .expense-item:hover {
      border-color: #334155;
    }

    .expense-name {
      color: #f1f5f9;
      font-size: 14px;
      font-weight: 500;
      word-break: break-word;
      flex: 1;
      margin-right: 10px;
    }

    .expense-amount {
      color: #facc15;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
    }

    .expense-month-badge {
      font-size: 10px;
      color: #64748b;
      background: #1e293b;
      padding: 3px 8px;
      border-radius: 6px;
      margin-left: 8px;
      white-space: nowrap;
      font-weight: 600;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 18px;
      cursor: pointer;
      padding: 0 0 0 10px;
      margin: 0;
      width: auto;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: none;
      transform: none;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 14px;
      background: #0f172a;
      border-radius: 10px;
      border: 1px solid #334155;
      margin-bottom: 20px;
    }

    .total-label {
      color: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .total-amount {
      color: #22c55e;
      font-size: 20px;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 28px 16px;
      color: #475569;
    }

    .empty-state p {
      font-size: 14px;
    }

    .monthly-section {
      border-top: 1px solid #334155;
      padding-top: 18px;
    }

    .monthly-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }

    .monthly-label {
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      min-width: 70px;
      text-transform: uppercase;
    }

    .monthly-track {
      flex: 1;
      height: 8px;
      background: #0f172a;
      border-radius: 10px;
      overflow: hidden;
    }

    .monthly-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.4s;
    }

    .monthly-amount {
      color: #f1f5f9;
      font-size: 13px;
      font-weight: 600;
      min-width: 80px;
      text-align: right;
      white-space: nowrap;
    }

    .monthly-empty {
      text-align: center;
      padding: 20px 16px;
      color: #475569;
      font-size: 13px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #1e293b;
      border-radius: 16px;
      padding: 28px 24px 20px;
      max-width: 340px;
      width: 100%;
      border: 1px solid #334155;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    .modal-box p {
      color: #f1f5f9;
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-box p strong {
      color: #facc15;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      margin: 0;
      padding: 10px;
      font-size: 14px;
      border-radius: 10px;
    }

    .btn-cancel {
      background: #334155 !important;
    }

    .btn-cancel:hover {
      background: #475569 !important;
    }

    .btn-confirm-delete {
      background: #ef4444 !important;
    }

    .btn-confirm-delete:hover {
      background: #dc2626 !important;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #22c55e;
      color: #052e16;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #ef4444;
      color: #fff;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px 14px;
      }

      .form-group {
        min-width: 100%;
      }

      h1 {
        font-size: 22px;
      }

      .total-amount {
        font-size: 18px;
      }

      .monthly-label {
        min-width: 60px;
        font-size: 12px;
      }

      .monthly-amount {
        font-size: 12px;
        min-width: 70px;
      }

      .toast {
        font-size: 13px;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>
    <p class="subtitle">Keep tabs on your spending</p>

    <div class="form-row">
      <div class="form-group" style="flex: 1.4;">
        <label for="expenseName">Expense</label>
        <input type="text" id="expenseName" placeholder="e.g. Groceries" autocomplete="off" autofocus>
        <div class="suggestion-box" id="suggestionBox"></div>
      </div>
      <div class="form-group">
        <label for="expenseAmount">Amount</label>
        <div class="input-wrapper">
          <span class="naira-prefix">&#8358;</span>
          <input type="number" id="expenseAmount" class="amount-input" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-group" style="min-width: 120px; flex: 0.8;">
        <label for="expenseMonth">Month</label>
        <input type="month" id="expenseMonth">
      </div>
    </div>

    <button id="addBtn">+ Add Expense</button>

    <div class="section-label">Expenses</div>
    <ul class="expense-list" id="expenseList">
      <li class="empty-state"><p>No expenses yet. Add one above!</p></li>
    </ul>

    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-amount" id="totalDisplay">&#8358;0.00</span>
    </div>

    <div class="monthly-section">
      <div class="section-label">Monthly Analysis</div>
      <div id="monthlyAnalysis"></div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <p>Delete <strong id="deleteTargetName"></strong>?</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelDelete">Cancel</button>
        <button class="btn-confirm-delete" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const expenseName = document.getElementById('expenseName');
    const expenseAmount = document.getElementById('expenseAmount');
    const expenseMonth = document.getElementById('expenseMonth');
    const addBtn = document.getElementById('addBtn');
    const expenseList = document.getElementById('expenseList');
    const totalDisplay = document.getElementById('totalDisplay');
    const monthlyAnalysis = document.getElementById('monthlyAnalysis');
    const suggestionBox = document.getElementById('suggestionBox');
    const modal = document.getElementById('confirmModal');
    const deleteTargetName = document.getElementById('deleteTargetName');
    const cancelDelete = document.getElementById('cancelDelete');
    const confirmDelete = document.getElementById('confirmDelete');
    const toast = document.getElementById('toast');

    const expenses = [];
    let pendingDeleteIndex = null;

    const COMMON_EXPENSES = [
      'Food & Groceries',
      'Transport / Fuel',
      'Rent',
      'Electricity Bill',
      'Water Bill',
      'Internet / Data',
      'Phone / Airtime',
      'Health / Medical',
      'Dining Out',
      'Entertainment',
      'Shopping / Clothing',
      'Education / School Fees',
      'Savings / Investments',
      'Insurance',
      'Household Supplies',
      'Personal Care',
      'Netflix / Subscriptions',
      'Gym / Fitness',
      'Gifts / Donations',
      'Miscellaneous'
    ];

    const MONTH_COLORS = [
      '#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e',
      '#f97316', '#eab308', '#22c55e', '#14b8a6',
      '#06b6d4', '#6366f1', '#a855f7', '#d946ef'
    ];

    function getMonthColor(index) {
      return MONTH_COLORS[index % MONTH_COLORS.length];
    }

    function getCurrentMonth() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    function formatDisplayMonth(ym) {
      const [y, m] = ym.split('-');
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
        'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return `${months[parseInt(m, 10) - 1]} ${y}`;
    }

    function formatNaira(amount) {
      return '\u20A6' + Number(amount).toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function updateTotal() {
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      totalDisplay.textContent = formatNaira(total);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderExpenses() {
      if (expenses.length === 0) {
        expenseList.innerHTML = '<li class="empty-state"><p>No expenses yet. Add one above!</p></li>';
        return;
      }

      expenseList.innerHTML = expenses.map((expense, index) => `
        <li class="expense-item">
          <span class="expense-name">
            ${escapeHtml(expense.name)}
            <span class="expense-month-badge">${formatDisplayMonth(expense.month)}</span>
          </span>
          <span class="expense-amount">${formatNaira(expense.amount)}</span>
          <button class="delete-btn" data-index="${index}" title="Delete">&times;</button>
        </li>
      `).join('');
    }

    function renderMonthlyAnalysis() {
      if (expenses.length === 0) {
        monthlyAnalysis.innerHTML = '<div class="monthly-empty">No data to analyse yet.</div>';
        return;
      }

      const monthTotals = {};
      expenses.forEach(e => {
        monthTotals[e.month] = (monthTotals[e.month] || 0) + e.amount;
      });

      const sortedMonths = Object.keys(monthTotals).sort();
      const maxTotal = Math.max(...Object.values(monthTotals), 1);

      monthlyAnalysis.innerHTML = sortedMonths.map((ym, i) => {
        const total = monthTotals[ym];
        const pct = (total / maxTotal) * 100;
        const color = getMonthColor(i);
        return `
          <div class="monthly-bar-wrap">
            <span class="monthly-label">${formatDisplayMonth(ym)}</span>
            <div class="monthly-track">
              <div class="monthly-fill" style="width: ${pct}%; background: ${color};"></div>
            </div>
            <span class="monthly-amount">${formatNaira(total)}</span>
          </div>
        `;
      }).join('');
    }

    function showToast(message, isError) {
      toast.textContent = message;
      toast.className = 'toast' + (isError ? ' error' : '');
      requestAnimationFrame(() => {
        toast.classList.add('show');
      });
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    function addExpense() {
      const name = expenseName.value.trim();
      const amount = parseFloat(expenseAmount.value);
      let month = expenseMonth.value || getCurrentMonth();

      if (!name) {
        expenseName.focus();
        showToast('Please enter an expense name', true);
        return;
      }

      if (isNaN(amount) || amount <= 0) {
        expenseAmount.focus();
        showToast('Please enter a valid amount', true);
        return;
      }

      expenses.push({ name, amount, month });
      expenseName.value = '';
      expenseAmount.value = '';
      expenseMonth.value = getCurrentMonth();
      closeSuggestions();

      renderExpenses();
      updateTotal();
      renderMonthlyAnalysis();
      expenseName.focus();
      showToast('Expense added!');
    }

    function deleteExpense(index) {
      expenses.splice(index, 1);
      renderExpenses();
      updateTotal();
      renderMonthlyAnalysis();
      showToast('Expense deleted');
    }

    function openConfirmModal(index) {
      pendingDeleteIndex = index;
      deleteTargetName.textContent = expenses[index].name;
      modal.classList.add('active');
    }

    function closeConfirmModal() {
      pendingDeleteIndex = null;
      modal.classList.remove('active');
    }

    function renderSuggestions() {
      suggestionBox.innerHTML = COMMON_EXPENSES
        .map(s => `<div class="suggestion-item">${escapeHtml(s)}</div>`)
        .join('');
      suggestionBox.classList.add('active');
    }

    function closeSuggestions() {
      suggestionBox.classList.remove('active');
    }

    expenseName.addEventListener('click', () => {
      renderSuggestions();
    });

    expenseName.addEventListener('focus', () => {
      renderSuggestions();
    });

    expenseName.addEventListener('blur', () => {
      setTimeout(closeSuggestions, 160);
    });

    expenseName.addEventListener('input', () => {
      if (expenseName.value.trim()) {
        closeSuggestions();
      } else {
        renderSuggestions();
      }
    });

    expenseName.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        expenseAmount.focus();
      }
    });

    suggestionBox.addEventListener('mousedown', (e) => {
      const item = e.target.closest('.suggestion-item');
      if (item) {
        expenseName.value = item.textContent;
        closeSuggestions();
        expenseAmount.focus();
      }
    });

    expenseAmount.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addExpense();
    });

    addBtn.addEventListener('click', addExpense);

    expenseList.addEventListener('click', (e) => {
      const btn = e.target.closest('.delete-btn');
      if (btn) {
        const index = parseInt(btn.dataset.index);
        openConfirmModal(index);
      }
    });

    confirmDelete.addEventListener('click', () => {
      if (pendingDeleteIndex !== null) {
        deleteExpense(pendingDeleteIndex);
        closeConfirmModal();
      }
    });

    cancelDelete.addEventListener('click', closeConfirmModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeConfirmModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeConfirmModal();
      }
    });

    expenseMonth.value = getCurrentMonth();
    updateTotal();
    renderMonthlyAnalysis();
  </script>
</body>
</html>
