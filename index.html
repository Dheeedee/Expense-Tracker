<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1120 0%, #1a2332 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.6);
    }

    h1 {
      color: #f8fafc;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.3px;
    }

    h1 span {
      color: #3b82f6;
    }

    .subtitle {
      color: #64748b;
      text-align: center;
      font-size: 14px;
      margin-top: 4px;
      margin-bottom: 28px;
    }

    .form-card {
      background: #0f172a;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #1e293b;
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 130px;
      position: relative;
    }

    .form-group label {
      display: block;
      color: #64748b;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .naira-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-weight: 600;
      font-size: 15px;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #1e293b;
      border-radius: 10px;
      background: #0b1120;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    input[type="month"] {
      text-transform: uppercase;
      color-scheme: dark;
    }

    .amount-input {
      padding-left: 28px;
    }

    .suggestion-box {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: #0b1120;
      border: 1.5px solid #3b82f6;
      border-radius: 10px;
      z-index: 10;
      max-height: 192px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      scrollbar-width: thin;
      scrollbar-color: #1e293b transparent;
    }

    .suggestion-box.active {
      display: block;
      animation: dropIn 0.15s ease-out;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .suggestion-box::-webkit-scrollbar {
      width: 4px;
    }

    .suggestion-box::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    .suggestion-item {
      padding: 9px 14px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .suggestion-item:first-child {
      border-radius: 9px 9px 0 0;
    }

    .suggestion-item:last-child {
      border-radius: 0 0 9px 9px;
    }

    .suggestion-item:hover {
      background: rgba(59, 130, 246, 0.1);
      color: #f1f5f9;
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
    }

    .add-btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .section-label {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .expense-count {
      color: #475569;
      font-size: 12px;
      font-weight: 600;
      background: #0f172a;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #1e293b;
    }

    .expense-list {
      list-style: none;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 14px;
      scrollbar-width: thin;
      scrollbar-color: #1e293b transparent;
    }

    .expense-list::-webkit-scrollbar {
      width: 4px;
    }

    .expense-list::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 14px;
      background: #0f172a;
      border-radius: 12px;
      margin-bottom: 6px;
      border: 1px solid #1e293b;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .expense-item:hover {
      border-color: #334155;
    }

    .expense-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .expense-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .expense-name {
      color: #f1f5f9;
      font-size: 14px;
      font-weight: 500;
      word-break: break-word;
    }

    .expense-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .expense-month-badge {
      font-size: 10px;
      color: #64748b;
      background: #1e293b;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
      white-space: nowrap;
    }

    .expense-amount {
      color: #facc15;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 20px;
      cursor: pointer;
      padding: 0 0 0 10px;
      margin: 0;
      width: auto;
      line-height: 1;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: none;
      transform: none;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      background: linear-gradient(135deg, #0f172a, #0b1120);
      border-radius: 14px;
      border: 1px solid #1e293b;
      margin-bottom: 20px;
    }

    .total-label {
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .total-amount {
      color: #22c55e;
      font-size: 22px;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #475569;
    }

    .empty-state p {
      font-size: 14px;
    }

    .empty-state .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    .monthly-section {
      border-top: 1px solid #1e293b;
      padding-top: 18px;
    }

    .monthly-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      animation: slideIn 0.3s ease-out;
    }

    .monthly-label {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      min-width: 72px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .monthly-track {
      flex: 1;
      height: 10px;
      background: #0b1120;
      border-radius: 10px;
      overflow: hidden;
    }

    .monthly-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .monthly-amount {
      color: #f1f5f9;
      font-size: 13px;
      font-weight: 600;
      min-width: 85px;
      text-align: right;
      white-space: nowrap;
    }

    .monthly-empty {
      text-align: center;
      padding: 24px 16px;
      color: #475569;
      font-size: 13px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 16px;
      animation: fadeIn 0.15s ease-out;
    }

    .modal-overlay.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-box {
      background: #1e293b;
      border-radius: 18px;
      padding: 32px 28px 24px;
      max-width: 340px;
      width: 100%;
      border: 1px solid #334155;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
      text-align: center;
      animation: modalPop 0.2s ease-out;
    }

    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-box .modal-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .modal-box p {
      color: #f1f5f9;
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-box p strong {
      color: #facc15;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      margin: 0;
      padding: 11px;
      font-size: 14px;
      border-radius: 12px;
      font-weight: 600;
    }

    .btn-cancel {
      background: #334155 !important;
      color: #cbd5e1 !important;
    }

    .btn-cancel:hover {
      background: #475569 !important;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-confirm-delete {
      background: #ef4444 !important;
    }

    .btn-confirm-delete:hover {
      background: #dc2626 !important;
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.35) !important;
      transform: translateY(-1px) !important;
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      pointer-events: none;
    }

    .toast {
      background: #22c55e;
      color: #052e16;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: #ef4444;
      color: #fff;
    }

    @media (max-width: 520px) {
      .container {
        padding: 20px 14px;
        border-radius: 18px;
      }

      .form-card {
        padding: 14px;
      }

      .form-group {
        min-width: 100%;
      }

      h1 {
        font-size: 24px;
      }

      .total-amount {
        font-size: 18px;
      }

      .monthly-label {
        min-width: 58px;
        font-size: 11px;
      }

      .monthly-amount {
        font-size: 12px;
        min-width: 70px;
      }

      .toast {
        font-size: 13px;
        padding: 10px 18px;
      }

      .expense-item {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Expense<span>Tracker</span></h1>
    <p class="subtitle">Keep tabs on your spending</p>

    <div class="form-card">
      <div class="form-row">
        <div class="form-group" style="flex: 1.4;">
          <label for="expenseName">Expense</label>
          <input type="text" id="expenseName" placeholder="e.g. Groceries" autocomplete="off">
          <div class="suggestion-box" id="suggestionBox"></div>
        </div>
        <div class="form-group">
          <label for="expenseAmount">Amount</label>
          <div class="input-wrapper">
            <span class="naira-prefix">&#8358;</span>
            <input type="number" id="expenseAmount" class="amount-input" placeholder="0.00" min="0" step="0.01">
          </div>
        </div>
        <div class="form-group" style="min-width: 120px; flex: 0.8;">
          <label for="expenseMonth">Month</label>
          <input type="month" id="expenseMonth">
        </div>
      </div>

      <button class="add-btn" id="addBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Add Expense
      </button>
    </div>

    <div class="list-header">
      <span class="section-label">Expenses</span>
      <span class="expense-count" id="expenseCount">0 items</span>
    </div>
    <ul class="expense-list" id="expenseList">
      <li class="empty-state">
        <div class="empty-icon">&#128176;</div>
        <p>No expenses yet. Add one above!</p>
      </li>
    </ul>

    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-amount" id="totalDisplay">&#8358;0.00</span>
    </div>

    <div class="monthly-section">
      <div class="list-header">
        <span class="section-label">Monthly Analysis</span>
      </div>
      <div id="monthlyAnalysis"></div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <div class="modal-icon">&#9888;&#65039;</div>
      <p>Delete <strong id="deleteTargetName"></strong>?</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelDelete">Cancel</button>
        <button class="btn-confirm-delete" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast-container">
    <div class="toast" id="toast"></div>
  </div>

  <script>
    const expenseName = document.getElementById('expenseName');
    const expenseAmount = document.getElementById('expenseAmount');
    const expenseMonth = document.getElementById('expenseMonth');
    const addBtn = document.getElementById('addBtn');
    const expenseList = document.getElementById('expenseList');
    const expenseCount = document.getElementById('expenseCount');
    const totalDisplay = document.getElementById('totalDisplay');
    const monthlyAnalysis = document.getElementById('monthlyAnalysis');
    const suggestionBox = document.getElementById('suggestionBox');
    const modal = document.getElementById('confirmModal');
    const deleteTargetName = document.getElementById('deleteTargetName');
    const cancelDelete = document.getElementById('cancelDelete');
    const confirmDelete = document.getElementById('confirmDelete');
    const toast = document.getElementById('toast');

    const expenses = [];
    let pendingDeleteIndex = null;
    let hasInteracted = false;
    let toastTimer = null;

    const COMMON_EXPENSES = [
      'Food & Groceries',
      'Transport / Fuel',
      'Rent',
      'Electricity Bill',
      'Water Bill',
      'Internet / Data',
      'Phone / Airtime',
      'Health / Medical',
      'Dining Out',
      'Entertainment',
      'Shopping / Clothing',
      'Education / School Fees',
      'Savings / Investments',
      'Insurance',
      'Household Supplies',
      'Personal Care',
      'Netflix / Subscriptions',
      'Gym / Fitness',
      'Gifts / Donations',
      'Miscellaneous'
    ];

    const MONTH_COLORS = [
      '#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e',
      '#f97316', '#eab308', '#22c55e', '#14b8a6',
      '#06b6d4', '#6366f1', '#a855f7', '#d946ef'
    ];

    function getMonthColor(index) {
      return MONTH_COLORS[index % MONTH_COLORS.length];
    }

    function getCurrentMonth() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    function formatDisplayMonth(ym) {
      if (!ym || !ym.includes('-')) return '';
      const [y, m] = ym.split('-');
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
        'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const mi = parseInt(m, 10) - 1;
      if (mi < 0 || mi > 11) return ym;
      return `${months[mi]} ${y}`;
    }

    function formatNaira(amount) {
      return '\u20A6' + Number(amount).toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function updateTotal() {
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      totalDisplay.textContent = formatNaira(total);
    }

    function updateCount() {
      const len = expenses.length;
      expenseCount.textContent = len + ' item' + (len !== 1 ? 's' : '');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderExpenses() {
      if (expenses.length === 0) {
        expenseList.innerHTML = '<li class="empty-state"><div class="empty-icon">&#128176;</div><p>No expenses yet. Add one above!</p></li>';
        return;
      }

      expenseList.innerHTML = expenses.map((expense, index) => {
        const monthLabel = formatDisplayMonth(expense.month);
        return `
          <li class="expense-item">
            <div class="expense-info">
              <span class="expense-dot" style="background: ${getMonthColor(index % MONTH_COLORS.length)}"></span>
              <span class="expense-name">${escapeHtml(expense.name)}</span>
            </div>
            <div class="expense-meta">
              ${monthLabel ? `<span class="expense-month-badge">${escapeHtml(monthLabel)}</span>` : ''}
              <span class="expense-amount">${formatNaira(expense.amount)}</span>
              <button class="delete-btn" data-index="${index}" title="Delete expense">&times;</button>
            </div>
          </li>
        `;
      }).join('');
    }

    function renderMonthlyAnalysis() {
      if (expenses.length === 0) {
        monthlyAnalysis.innerHTML = '<div class="monthly-empty">No data to analyse yet.</div>';
        return;
      }

      const monthTotals = {};
      expenses.forEach(e => {
        monthTotals[e.month] = (monthTotals[e.month] || 0) + e.amount;
      });

      const sortedMonths = Object.keys(monthTotals).sort();
      const maxTotal = Math.max(...Object.values(monthTotals), 1);

      monthlyAnalysis.innerHTML = sortedMonths.map((ym, i) => {
        const total = monthTotals[ym];
        const pct = (total / maxTotal) * 100;
        const color = getMonthColor(i);
        return `
          <div class="monthly-bar-wrap">
            <span class="monthly-label">${formatDisplayMonth(ym)}</span>
            <div class="monthly-track">
              <div class="monthly-fill" style="width: ${pct}%; background: ${color};"></div>
            </div>
            <span class="monthly-amount">${formatNaira(total)}</span>
          </div>
        `;
      }).join('');
    }

    function showToast(message, isError) {
      if (toastTimer) {
        clearTimeout(toastTimer);
        toastTimer = null;
      }
      toast.textContent = message;
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.classList.add('show');
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
        toastTimer = null;
      }, 2500);
    }

    function addExpense() {
      const name = expenseName.value.trim();
      const amount = parseFloat(expenseAmount.value);

      if (!name) {
        expenseName.focus();
        showToast('Please enter an expense name', true);
        return;
      }

      if (isNaN(amount) || amount <= 0) {
        expenseAmount.focus();
        showToast('Please enter a valid amount', true);
        return;
      }

      const month = expenseMonth.value || getCurrentMonth();

      expenses.push({ name, amount, month });

      expenseName.value = '';
      expenseAmount.value = '';
      closeSuggestions();

      renderExpenses();
      updateTotal();
      updateCount();
      renderMonthlyAnalysis();
      expenseName.focus();
      showToast('Expense added!');
    }

    function deleteExpense(index) {
      if (index < 0 || index >= expenses.length) return;
      expenses.splice(index, 1);
      renderExpenses();
      updateTotal();
      updateCount();
      renderMonthlyAnalysis();
      showToast('Expense deleted');
    }

    function openConfirmModal(index) {
      if (index < 0 || index >= expenses.length) return;
      pendingDeleteIndex = index;
      deleteTargetName.textContent = expenses[index].name;
      modal.classList.add('active');
    }

    function closeConfirmModal() {
      pendingDeleteIndex = null;
      modal.classList.remove('active');
    }

    function renderSuggestions() {
      suggestionBox.innerHTML = COMMON_EXPENSES
        .map(s => `<div class="suggestion-item">${escapeHtml(s)}</div>`)
        .join('');
      suggestionBox.classList.add('active');
    }

    function closeSuggestions() {
      suggestionBox.classList.remove('active');
    }

    expenseName.addEventListener('click', () => {
      if (!hasInteracted) hasInteracted = true;
      renderSuggestions();
    });

    expenseName.addEventListener('focus', () => {
      if (!hasInteracted) {
        hasInteracted = true;
        return;
      }
      renderSuggestions();
    });

    expenseName.addEventListener('blur', () => {
      setTimeout(closeSuggestions, 180);
    });

    expenseName.addEventListener('input', () => {
      if (expenseName.value.trim()) {
        closeSuggestions();
      }
    });

    expenseName.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        expenseAmount.focus();
      }
    });

    suggestionBox.addEventListener('mousedown', (e) => {
      const item = e.target.closest('.suggestion-item');
      if (item) {
        expenseName.value = item.textContent;
        closeSuggestions();
        expenseAmount.focus();
      }
    });

    expenseAmount.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addExpense();
      }
    });

    addBtn.addEventListener('click', addExpense);

    expenseList.addEventListener('click', (e) => {
      const btn = e.target.closest('.delete-btn');
      if (btn) {
        const index = parseInt(btn.dataset.index, 10);
        if (!isNaN(index)) openConfirmModal(index);
      }
    });

    confirmDelete.addEventListener('click', () => {
      if (pendingDeleteIndex !== null) {
        deleteExpense(pendingDeleteIndex);
        pendingDeleteIndex = null;
        closeConfirmModal();
      }
    });

    cancelDelete.addEventListener('click', closeConfirmModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeConfirmModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeConfirmModal();
      }
    });

    expenseMonth.value = getCurrentMonth();
    updateTotal();
    updateCount();
    renderMonthlyAnalysis();
  </script>
</body>
</html>
